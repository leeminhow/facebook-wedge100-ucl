# /etc/apache2/sites-available/wedge100-nos.conf
# 설치: sudo a2ensite wedge100-nos && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName wedge100.local
    DocumentRoot /usr/local/wedge100-nos/webui

    <Directory /usr/local/wedge100-nos/webui>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # API 디렉터리 - PHP 실행 허용
    <Directory /usr/local/wedge100-nos/webui/api>
        Options -Indexes
        Require all granted
    </Directory>

    # wedge CLI 실행 권한 (www-data가 sudo 없이 실행할 수 있게)
    # /etc/sudoers.d/wedge100-www 파일에 아래 추가:
    #   www-data ALL=(root) NOPASSWD: /usr/local/bin/wedge
    #   www-data ALL=(root) NOPASSWD: /usr/bin/python3 /usr/local/wedge100-nos/*

    ErrorLog ${APACHE_LOG_DIR}/wedge100-error.log
    CustomLog ${APACHE_LOG_DIR}/wedge100-access.log combined

    # 보안: 홈 네트워크 대역만 허용 (필요시 수정)
    # <Location />
    #     Require ip 192.168.0.0/24
    # </Location>
</VirtualHost>
