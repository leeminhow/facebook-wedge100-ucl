# ============================================================
# wedge100-nos SNMP 설정 추가분
# /etc/snmp/snmpd.conf 파일 끝에 아래 내용을 추가하세요.
# ============================================================

# ── 기본 접근 설정 (필요에 따라 community string 변경) ──────
rocommunity  public  127.0.0.1
rocommunity  public  192.168.0.0/24    # 홈 랩 내부 대역으로 제한

# ── 시스템 정보 ──────────────────────────────────────────────
sysLocation  HomeLabRack
sysContact   admin@homelab.local
sysDescr     Wedge100 32x100G (wedge100-nos)

# ── SNMP extend 정의 ─────────────────────────────────────────
# 포트 링크 상태 / 속도
extend  wedgePortStatus   /usr/local/wedge100-nos/snmp_agents/port_status.py

# 포트 TX/RX 카운터
extend  wedgePortCounters /usr/local/wedge100-nos/snmp_agents/port_counters.py

# FAN RPM / 듀티
extend  wedgeFanSpeed     /usr/local/wedge100-nos/snmp_agents/fan_speed.py

# 온도 센서
extend  wedgeTemperature  /usr/local/wedge100-nos/snmp_agents/temperature.py

# PSU 상태
extend  wedgePsuStatus    /usr/local/wedge100-nos/snmp_agents/psu_status.py

# ── extend 실행 주기 캐시 (초) ───────────────────────────────
# 너무 잦은 SOC 소켓 호출을 방지하기 위해 캐시 시간 설정
extend-sh-timeout 10

# ── 기본 MIB (ifTable 등) ────────────────────────────────────
# ONL에서 네트워크 인터페이스 ifTable 자동 노출
# (별도 설정 불필요 - snmpd 기본 제공)

# ============================================================
# 조회 방법 예시 (스위치 밖 서버에서):
#
#   # 포트 상태 전체 조회
#   snmpwalk -v2c -c public <스위치IP> \
#     NET-SNMP-EXTEND-MIB::nsExtendOutput2Table
#
#   # 포트 상태만 필터
#   snmpwalk -v2c -c public <스위치IP> \
#     NET-SNMP-EXTEND-MIB::nsExtendOutput2Line."wedgePortStatus"
#
#   # FAN 속도
#   snmpwalk -v2c -c public <스위치IP> \
#     NET-SNMP-EXTEND-MIB::nsExtendOutput2Line."wedgeFanSpeed"
#
#   # 온도
#   snmpwalk -v2c -c public <스위치IP> \
#     NET-SNMP-EXTEND-MIB::nsExtendOutput2Line."wedgeTemperature"
# ============================================================
